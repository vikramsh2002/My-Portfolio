name: Portfolio V2 CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "portfolio-v2/**"
      - ".github/workflows/portfolio-v2-ci.yml"
      - ".github/workflows/portfolio-project-sync.yml"
      - ".github/prompts/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Portfolio V2 CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-v2/package-lock.json

      - name: Build Portfolio V2
        working-directory: portfolio-v2
        run: |
          npm ci
          npm run build
