name: Sync Portfolio Project with GitHub Models

on:
  workflow_dispatch:
    inputs:
      linkedin_update:
        description: "Paste the LinkedIn/profile project update text. Include URLs if available."
        required: true
        type: string
      model:
        description: "GitHub Models model id."
        required: true
        default: "openai/gpt-4o"
        type: string
      auto_merge:
        description: "Auto-merge low-risk PRs after the build passes."
        required: true
        default: false
        type: boolean
      deploy_preview:
        description: "Deploy a preview after creating the project PR."
        required: true
        default: true
        type: boolean
      preview_repository:
        description: "Preview hosting repository in owner/name format."
        required: true
        default: "vikramsh2002/My-Portfolio-Preview"
        type: string
      preview_branch:
        description: "Branch used by GitHub Pages in the preview repository."
        required: true
        default: "gh-pages"
        type: string
      preview_base:
        description: "Vite base path for the preview Pages site."
        required: true
        default: "/My-Portfolio-Preview/"
        type: string
      preview_url:
        description: "Public preview URL."
        required: true
        default: "https://vikramsh2002.github.io/My-Portfolio-Preview/"
        type: string
      card_image_url:
        description: "Optional image URL to use for the project card when no live site screenshot is available."
        required: false
        type: string
  repository_dispatch:
    types: [linkedin_project_update]

permissions:
  contents: write
  pull-requests: write
  models: read
  issues: write
  actions: write

concurrency:
  group: portfolio-project-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPDATE_TEXT: ${{ github.event.client_payload.linkedin_update || github.event.inputs.linkedin_update }}
      MODEL_ID: ${{ github.event.client_payload.model || github.event.inputs.model || 'openai/gpt-4o' }}
      AUTO_MERGE: ${{ github.event.client_payload.auto_merge || github.event.inputs.auto_merge || 'false' }}
      DEPLOY_PREVIEW: ${{ github.event.client_payload.deploy_preview || github.event.inputs.deploy_preview || 'true' }}
      PREVIEW_REPOSITORY: ${{ github.event.client_payload.preview_repository || github.event.inputs.preview_repository || 'vikramsh2002/My-Portfolio-Preview' }}
      PREVIEW_BRANCH: ${{ github.event.client_payload.preview_branch || github.event.inputs.preview_branch || 'gh-pages' }}
      PREVIEW_BASE: ${{ github.event.client_payload.preview_base || github.event.inputs.preview_base || '/My-Portfolio-Preview/' }}
      PREVIEW_URL: ${{ github.event.client_payload.preview_url || github.event.inputs.preview_url || 'https://vikramsh2002.github.io/My-Portfolio-Preview/' }}
      CARD_IMAGE_URL: ${{ github.event.client_payload.card_image_url || github.event.inputs.card_image_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio-v2/package-lock.json

      - name: Validate update text
        run: |
          if [ -z "$UPDATE_TEXT" ]; then
            echo "No LinkedIn/profile update text was provided." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Prepare prompt context
        id: prompt_context
        env:
          LINKEDIN_UPDATE_TEXT: ${{ env.UPDATE_TEXT }}
        run: |
          PROJECTS_JSON="$(node -e "const fs = require('node:fs'); const projects = JSON.parse(fs.readFileSync('portfolio-v2/src/projects.json', 'utf8')); process.stdout.write(JSON.stringify(projects));")"
          UPDATE_JSON="$(node -e "process.stdout.write(JSON.stringify(process.env.LINKEDIN_UPDATE_TEXT || ''));")"
          echo "current_projects=$PROJECTS_JSON" >> "$GITHUB_OUTPUT"
          echo "linkedin_update_json=$UPDATE_JSON" >> "$GITHUB_OUTPUT"

      - name: Extract project update with GitHub Models
        id: inference
        uses: actions/ai-inference@v1
        with:
          prompt-file: .github/prompts/portfolio-project-sync.prompt.yml
          input: |
            model: ${{ env.MODEL_ID }}
            current_projects: |-
              ${{ steps.prompt_context.outputs.current_projects }}
            linkedin_update_json: |-
              ${{ steps.prompt_context.outputs.linkedin_update_json }}

      - name: Apply model response to portfolio data
        id: apply
        continue-on-error: true
        env:
          CARD_IMAGE_URL: ${{ env.CARD_IMAGE_URL }}
        run: |
          node portfolio-v2/scripts/prepareProjectThumbnail.mjs "${{ steps.inference.outputs.response-file }}"
          node portfolio-v2/scripts/applyPortfolioProjectUpdate.mjs "${{ steps.inference.outputs.response-file }}"

      - name: Build portfolio
        id: build
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        working-directory: portfolio-v2
        run: |
          npm ci
          npm run build

      - name: Check for portfolio changes
        id: diff
        if: always()
        run: |
          if git diff --quiet -- portfolio-v2/src/projects.json portfolio-v2/public/images/Projects; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No portfolio data changes were produced." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            cat portfolio-v2/portfolio-sync-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create pull request
        id: pr
        if: steps.diff.outputs.changed == 'true' && steps.apply.outcome == 'success' && steps.build.outcome == 'success' && steps.apply.outputs.risk != 'high' && steps.apply.outputs.intent != 'needs_review' && steps.apply.outputs.action != 'needs_review' && steps.apply.outputs.image_status != 'missing' && steps.apply.outputs.image_status != 'failed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: portfolio-sync/${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add portfolio-v2/src/projects.json portfolio-v2/public/images/Projects
          git commit -m "Update portfolio project from profile sync"
          git push --set-upstream origin "$BRANCH_NAME"

          PR_URL="$(gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Update portfolio project from profile sync" \
            --body-file portfolio-v2/portfolio-sync-summary.md)"

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger CI for generated PR
        if: steps.pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.pr.outputs.branch_name }}
        run: |
          DISPATCH_PAYLOAD="$RUNNER_TEMP/portfolio-v2-ci-dispatch.json"
          printf '{"ref":"%s"}' "$BRANCH_NAME" > "$DISPATCH_PAYLOAD"

          curl --fail --silent --show-error \
            --request POST \
            --url "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/portfolio-v2-ci.yml/dispatches" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data @"$DISPATCH_PAYLOAD"

          echo "Triggered Portfolio V2 CI for $BRANCH_NAME." >> "$GITHUB_STEP_SUMMARY"

      - name: Build preview
        id: preview_build
        if: steps.pr.outputs.pr_url != '' && env.DEPLOY_PREVIEW == 'true'
        continue-on-error: true
        working-directory: portfolio-v2
        env:
          VITE_BASE: ${{ env.PREVIEW_BASE }}
        run: npm run build

      - name: Smoke check preview artifact
        id: preview_smoke
        if: steps.pr.outputs.pr_url != '' && env.DEPLOY_PREVIEW == 'true' && steps.preview_build.outcome == 'success'
        continue-on-error: true
        env:
          PROJECT_TITLE: ${{ steps.apply.outputs.project_title }}
        run: |
          if [ -z "$PROJECT_TITLE" ]; then
            echo "No project title was available for preview smoke checking." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if grep -R --include='*.html' --include='*.js' --fixed-strings --quiet "$PROJECT_TITLE" portfolio-v2/dist; then
            echo "Preview artifact contains project title: $PROJECT_TITLE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Preview artifact does not contain expected project title: $PROJECT_TITLE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Deploy generated preview
        id: preview_deploy
        if: steps.pr.outputs.pr_url != '' && env.DEPLOY_PREVIEW == 'true' && steps.preview_build.outcome == 'success' && steps.preview_smoke.outcome == 'success'
        continue-on-error: true
        env:
          PORTFOLIO_PREVIEW_TOKEN: ${{ secrets.PORTFOLIO_PREVIEW_TOKEN }}
          SOURCE_REF: ${{ steps.pr.outputs.branch_name }}
        run: |
          set -euo pipefail

          if [ -z "$PORTFOLIO_PREVIEW_TOKEN" ]; then
            echo "PORTFOLIO_PREVIEW_TOKEN is required to push to $PREVIEW_REPOSITORY." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          SOURCE_SHA="$(git rev-parse HEAD)"
          PREVIEW_LINK="${PREVIEW_URL%/}/?v=${SOURCE_SHA}#projects"
          PREVIEW_REMOTE="https://x-access-token:${PORTFOLIO_PREVIEW_TOKEN}@github.com/${PREVIEW_REPOSITORY}.git"

          git clone --depth 1 --branch "$PREVIEW_BRANCH" "$PREVIEW_REMOTE" _preview || {
            git clone --depth 1 "$PREVIEW_REMOTE" _preview
            git -C _preview checkout --orphan "$PREVIEW_BRANCH"
            git -C _preview rm -rf . || true
          }

          find _preview -mindepth 1 \
            ! -path "_preview/.git" \
            ! -path "_preview/.git/*" \
            -exec rm -rf {} +

          cp -R portfolio-v2/dist/. _preview/
          touch _preview/.nojekyll

          cat > _preview/preview-metadata.json <<EOF
          {
            "source_repository": "$GITHUB_REPOSITORY",
            "source_ref": "$SOURCE_REF",
            "source_sha": "$SOURCE_SHA",
            "preview_base": "$PREVIEW_BASE",
            "preview_url": "$PREVIEW_URL",
            "deployed_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          git -C _preview config user.name "github-actions[bot]"
          git -C _preview config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C _preview add .

          if git -C _preview diff --cached --quiet; then
            echo "Preview repository already matches this build." >> "$GITHUB_STEP_SUMMARY"
          else
            git -C _preview commit -m "Deploy preview for ${GITHUB_REPOSITORY}@${SOURCE_SHA::7}"
            git -C _preview push origin "$PREVIEW_BRANCH"
          fi

          {
            echo "## Portfolio Preview"
            echo
            echo "- Preview URL: $PREVIEW_LINK"
            echo "- Preview repository: $PREVIEW_REPOSITORY"
            echo "- Preview branch: $PREVIEW_BRANCH"
            echo "- Source ref: $SOURCE_REF"
            echo "- Source SHA: $SOURCE_SHA"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "preview_link=$PREVIEW_LINK" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"

      - name: Comment preview link on PR
        if: steps.preview_deploy.outputs.preview_link != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PREVIEW_LINK: ${{ steps.preview_deploy.outputs.preview_link }}
          SOURCE_REF: ${{ steps.pr.outputs.branch_name }}
          SOURCE_SHA: ${{ steps.preview_deploy.outputs.source_sha }}
        run: |
          PR_NUMBER="${PR_URL##*/}"
          gh pr comment "$PR_NUMBER" --body "Portfolio preview deployed:

          $PREVIEW_LINK

          Source: $SOURCE_REF @ ${SOURCE_SHA:0:7}"

      - name: Ask for review on blocked update
        id: review_issue
        if: always() && (steps.apply.outcome == 'failure' || steps.build.outcome == 'failure' || steps.apply.outputs.risk == 'high' || steps.apply.outputs.intent == 'needs_review' || steps.apply.outputs.action == 'needs_review' || steps.apply.outputs.image_status == 'missing' || steps.apply.outputs.image_status == 'failed' || (env.DEPLOY_PREVIEW == 'true' && (steps.preview_build.outcome == 'failure' || steps.preview_smoke.outcome == 'failure' || steps.preview_deploy.outcome == 'failure')))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_FILE="portfolio-v2/portfolio-sync-review.md"
          {
            echo "# Portfolio Sync Needs Review"
            echo
            echo "- Apply status: ${{ steps.apply.outcome }}"
            echo "- Build status: ${{ steps.build.outcome }}"
            echo "- Risk: ${{ steps.apply.outputs.risk }}"
            echo "- Intent: ${{ steps.apply.outputs.intent }}"
            echo "- Action: ${{ steps.apply.outputs.action }}"
            echo "- Image status: ${{ steps.apply.outputs.image_status }}"
            echo "- Image path: ${{ steps.apply.outputs.image_path }}"
            echo "- Image source: ${{ steps.apply.outputs.image_source }}"
            echo "- Preview build status: ${{ steps.preview_build.outcome }}"
            echo "- Preview smoke status: ${{ steps.preview_smoke.outcome }}"
            echo "- Preview deploy status: ${{ steps.preview_deploy.outcome }}"
            echo "- Preview URL: ${{ steps.preview_deploy.outputs.preview_link }}"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            if [ "${{ steps.apply.outputs.image_status }}" = "missing" ] || [ "${{ steps.apply.outputs.image_status }}" = "failed" ]; then
              echo "Please rerun the workflow with a card_image_url or add a project screenshot manually."
              echo
            fi
            if [ -f "portfolio-v2/portfolio-sync-summary.md" ]; then
              cat portfolio-v2/portfolio-sync-summary.md
            else
              echo "The sync did not produce a summary file."
            fi
          } > "$REVIEW_FILE"

          ISSUE_URL="$(gh issue create \
            --title "Portfolio sync needs review" \
            --body-file "$REVIEW_FILE")"

          echo "issue_url=$ISSUE_URL" >> "$GITHUB_OUTPUT"
          echo "Created review issue: $ISSUE_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Send review email
        if: always() && steps.review_issue.outputs.issue_url != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.PORTFOLIO_ALERT_EMAIL }}
          ALERT_FROM: ${{ secrets.PORTFOLIO_ALERT_FROM }}
          ISSUE_URL: ${{ steps.review_issue.outputs.issue_url }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$ALERT_EMAIL" ]; then
            echo "Review email skipped because RESEND_API_KEY or PORTFOLIO_ALERT_EMAIL is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          FROM_ADDRESS="${ALERT_FROM:-Portfolio Sync <onboarding@resend.dev>}"
          PAYLOAD_FILE="$RUNNER_TEMP/portfolio-sync-email.json"
          export FROM_ADDRESS
          export PAYLOAD_FILE

          node -e "
            const fs = require('node:fs');
            const issueUrl = process.env.ISSUE_URL;
            const body = fs.existsSync('portfolio-v2/portfolio-sync-review.md')
              ? fs.readFileSync('portfolio-v2/portfolio-sync-review.md', 'utf8')
              : 'Portfolio sync needs review.';
            fs.writeFileSync(process.env.PAYLOAD_FILE, JSON.stringify({
              from: process.env.FROM_ADDRESS,
              to: [process.env.ALERT_EMAIL],
              subject: 'Portfolio sync needs review',
              text: body + '\n\nReview issue: ' + issueUrl
            }));
          "

          curl --fail --silent --show-error \
            --request POST "https://api.resend.com/emails" \
            --header "Authorization: Bearer $RESEND_API_KEY" \
            --header "Content-Type: application/json" \
            --data @"$PAYLOAD_FILE"

          echo "Review email sent to $ALERT_EMAIL." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when preview is broken
        if: always() && env.DEPLOY_PREVIEW == 'true' && (steps.preview_build.outcome == 'failure' || steps.preview_smoke.outcome == 'failure' || steps.preview_deploy.outcome == 'failure')
        run: |
          echo "Portfolio preview failed, so auto-merge is blocked." >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Auto-merge low-risk project update
        if: env.AUTO_MERGE == 'true' && steps.apply.outputs.risk == 'low' && steps.pr.outputs.pr_url != '' && (env.DEPLOY_PREVIEW != 'true' || (steps.preview_smoke.outcome == 'success' && steps.preview_deploy.outcome == 'success'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr merge "${{ steps.pr.outputs.pr_url }}" --squash --delete-branch --auto; then
            echo "Auto-merge enabled for low-risk portfolio update." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Auto-merge could not be enabled. Please review and merge the PR manually." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail when build is broken
        if: always() && steps.build.outcome == 'failure'
        run: |
          echo "Portfolio build failed, so the sync was blocked." >> "$GITHUB_STEP_SUMMARY"
          exit 1
